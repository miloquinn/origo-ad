        match: googlevideo.com
    - protocol:
        match: udp
    policy: REJECT
- and:
    name: YouTube API UDP/QUIC 阻断
    match:
    - domain:
        match: youtubei.googleapis.com
    - protocol:
        match: udp
    policy: REJECT
- geoip:
    match: CN
    policy: DIRECT
- default:
    policy: 🧭 兜底分流
