# 省电版模块接入片段
# 先用 lite。如果广告明显变多，再把 lite 的 enabled 改 false，balanced 改 true。
# 注意：把下面的 URL 替换成你实际发布后的 HTTPS 地址。

modules:
- name: Origo Ad Lite
  url: https://github.com/miloquinn/origo-ad/raw/main/dist/origo-ad-lite.module
  enabled: true
- name: Origo Ad Balanced
  url: https://github.com/miloquinn/origo-ad/raw/main/dist/origo-ad-balanced.module
  enabled: false
- url: https://raw.githubusercontent.com/fmz200/wool_scripts/main/Surge/module/blockAds.module
  enabled: false
- url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/Surge/AdvertisingLite/AdvertisingLite.sgmodule
  enabled: false

# 如果要进一步省电，建议把 scriptings 里的 YouTube/Bilibili/X 响应脚本也先关掉。
# 那几条脚本需要 body_required，比普通域名拦截重很多。
