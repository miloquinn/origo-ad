name: Update Egern modules

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-egern-modules
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate battery-oriented modules
        run: |
          python tools/build.py \
            --no-profile \
            --base-url "https://github.com/${{ github.repository }}/raw/main/dist"

      - name: Verify lite and balanced modules stay script-free
        run: |
          ! grep -R -nE '\[Body Rewrite\]|\[Script\]|script_url|body_required|http-response|http_request' dist/origo-ad-lite.module dist/origo-ad-balanced.module

      - name: Verify generated metadata and template hygiene
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          modules = [
              Path("dist/origo-ad-lite.module"),
              Path("dist/origo-ad-balanced.module"),
              Path("dist/origo-ad-powerful.module"),
          ]
          descriptions = []
          for path in modules:
              text = path.read_text(encoding="utf-8")
              desc = next((line.removeprefix("#!desc=") for line in text.splitlines() if line.startswith("#!desc=")), "")
              if not desc:
                  raise SystemExit(f"{path} is missing #!desc")
              descriptions.append(desc)
          if len(set(descriptions)) != len(descriptions):
              raise SystemExit("generated module descriptions must be distinct")

          template = Path("dist/origo-vpn-template.yaml")
          text = template.read_text(encoding="utf-8")
          forbidden = [
              r"SxIpVsj",
              r"88bbf949",
              r"7272cbb",
              r"dfceb8ee",
              r"ca_p12",
              r"ca_passphrase",
              r"MIIKpA",
          ]
          for pattern in forbidden:
              if re.search(pattern, text):
                  raise SystemExit(f"template contains forbidden private marker: {pattern}")
          PY

      - name: Commit updated modules
        run: |
          if git diff --quiet -- dist; then
            echo "No upstream changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "Refresh generated Egern adblock modules" \
            -m "The workflow rebuilds the lite, balanced, and powerful modules from the configured upstream Egern modules. Generated output is deterministic, so this commit only appears when upstream content changes." \
            -m "Constraint: Keep lite and balanced free of Body Rewrite and Script sections; powerful intentionally keeps them for maximum blocking." \
            -m "Confidence: high" \
            -m "Scope-risk: narrow" \
            -m "Tested: tools/build.py --no-profile and script-free grep guard in GitHub Actions"
          git push
